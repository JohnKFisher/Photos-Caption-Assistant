name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build Swift package
        run: swift build -v

      - name: Run tests
        run: swift test -v

      - name: Package local app bundle
        run: ./scripts/build_app.sh

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v6
        with:
          name: Photos-Caption-Assistant-app
          path: dist/Photos Caption Assistant.app
          retention-days: 30

name: Release

on:
  push:
    branches:
      - main
    paths:
      - Sources/PhotosCaptionAssistant/Resources/Info.plist
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify package and tests
        run: |
          swift build -v
          swift test -v

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12_BASE64" || -z "$MACOS_CERTIFICATE_PASSWORD" || -z "$MACOS_KEYCHAIN_PASSWORD" ]]; then
            echo "Missing macOS signing certificate secrets." >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-certificate.p12"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

      - name: Build packaged app
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$MACOS_CODESIGN_IDENTITY" ]]; then
            echo "Missing MACOS_CODESIGN_IDENTITY secret." >&2
            exit 1
          fi
          ./scripts/build_app.sh

      - name: Build release DMG
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: ./scripts/create_dmg.sh

      - name: Read release metadata
        id: metadata
        run: |
          INFO_PLIST="Sources/PhotosCaptionAssistant/Resources/Info.plist"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST")"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"
          TAG="v$VERSION"
          RELEASE_NAME="Photos Caption Assistant v$VERSION (build $BUILD)"
          DMG_PATH="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"

          if [[ -z "$DMG_PATH" ]]; then
            echo "Release DMG was not created." >&2
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "build=$BUILD"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
            echo "dmg_path=$DMG_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Notarize and staple release DMG
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DMG_PATH: ${{ steps.metadata.outputs.dmg_path }}
        run: |
          if [[ -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Missing Apple notarization secrets." >&2
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -v "$DMG_PATH"

      - name: Verify tag safety
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-list -n 1 "$TAG")"
            if [[ "$EXISTING_SHA" != "$GITHUB_SHA" ]]; then
              echo "Tag $TAG already points at $EXISTING_SHA, not $GITHUB_SHA." >&2
              exit 1
            fi
          fi

      - name: Generate release notes
        id: notes
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          NOTES_FILE="$(mktemp)"
          ./scripts/release_notes.sh "$RELEASE_TAG" > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          DMG_PATH: ${{ steps.metadata.outputs.dmg_path }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$RELEASE_NAME" --notes-file "$NOTES_FILE"
            gh release upload "$TAG" "$DMG_PATH" --clobber
          else
            gh release create "$TAG" "$DMG_PATH" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes-file "$NOTES_FILE"
          fi
